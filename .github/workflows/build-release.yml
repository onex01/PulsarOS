name: Build Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: [self-hosted, linux, android-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup environment
        run: ./scripts/setup-env.sh

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-release-${{ github.ref }}

      - name: Build (release)
        env:
          PULSAROS_BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/build.sh build user

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ANDROID_SRC }}/out/target/product/zero3/*.img
          body_path: docs/RELEASE-NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}