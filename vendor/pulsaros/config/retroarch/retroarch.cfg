# =============================================================================
# PulsarOS — RetroArch default config
# Оптимизирован для Orange Pi Zero 3 (Allwinner H618 / Mali G31 MP2)
# =============================================================================

# Пути — PulsarOS storage layout
rgui_browser_directory = "/storage"
system_directory = "/data/media/0/Android/data/com.retroarch/files/system"
savefile_directory = "/data/media/0/RetroArch/saves"
savestate_directory = "/data/media/0/RetroArch/states"
screenshot_directory = "/data/media/0/RetroArch/screenshots"
recording_output_directory = "/data/media/0/RetroArch/recordings"

# Видео
video_driver = "glcore"
video_fullscreen = "true"
video_vsync = "true"
video_smooth = "false"
video_scale_integer = "false"
video_aspect_ratio_auto = "true"
video_threaded = "true"
video_max_swapchain_images = "3"

# GPU производительность (Mali G31 — без лишних эффектов)
video_shader_enable = "true"
video_shader = "shaders/crt/crt-simple.glslp"

# Аудио
audio_driver = "alsathread"
audio_latency = "64"
audio_sync = "true"
audio_resampler = "sinc"
audio_resampler_quality = "2"

# Геймпад
input_driver = "android"
input_autodetect_enable = "true"
input_analog_deadzone = "0.100000"
input_axis_threshold = "0.500000"

# Горячие клавиши (для геймпада — удержание Select + кнопка)
input_enable_hotkey_btn = "8"     # Select / Share
input_menu_toggle_btn = "1"       # Cross / A — вход в меню RetroArch
input_quit_btn = "9"              # Start
input_save_state_btn = "3"        # Square / X
input_load_state_btn = "0"        # Triangle / Y
input_rewind_btn = "2"            # Circle / B

# Rewind (перемотка назад — удобно для казуальной игры)
rewind_enable = "true"
rewind_granularity = "2"
rewind_buffer_size = "32"

# SaveState
savestate_auto_save = "true"
savestate_auto_load = "true"

# Сеть / RetroAchievements (выключено по умолчанию — пользователь включает сам)
cheevos_enable = "false"

# Интерфейс
menu_driver = "ozone"
ozone_collapse_subgroups = "true"

# Логирование (для debug — INFO, для release — ERROR)
log_verbosity = "false"
libretro_log_level = "1"
