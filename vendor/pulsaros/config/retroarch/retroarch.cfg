# PulsarOS RetroArch Configuration
# Optimized for Allwinner H618 / Mali G31 MP2
# SPDX-License-Identifier: MIT

# ── Video ────────────────────────────────────────────────────────────────────
video_driver = "gl"
video_context_driver = "android"
video_fullscreen = "true"
video_threaded = "true"
video_vsync = "true"
video_smooth = "false"
video_scale_integer = "true"
video_aspect_ratio_auto = "true"
video_shader_enable = "false"
video_max_frame_latency = "1"

# ── Audio ────────────────────────────────────────────────────────────────────
audio_driver = "opensl"
audio_latency = "64"
audio_rate_control = "true"
audio_resampler = "sinc"

# ── Input ────────────────────────────────────────────────────────────────────
input_driver = "android"
input_joypad_driver = "android"
input_max_users = "4"
input_autodetect_enable = "true"
input_menu_toggle_gamepad_combo = "3"  # Start+Select
input_rewind_btn = "6"                  # L2 (если есть)

# ── Paths (Android vendor partition) ─────────────────────────────────────────
libretro_directory = "/vendor/lib/libretro"
libretro_info_path = "/vendor/lib/libretro-info"
savefile_directory = "/storage/PulsarOS/roms/saves"
savestate_directory = "/storage/PulsarOS/roms/states"
screenshot_directory = "/storage/PulsarOS/roms/screenshots"
playlist_directory = "/storage/PulsarOS/roms/playlists"
core_assets_directory = "/storage/PulsarOS/retroarch/downloads"
thumbnails_directory = "/storage/PulsarOS/retroarch/thumbnails"
cheat_database_path = "/vendor/etc/retroarch/cheats"

# ── Menu ─────────────────────────────────────────────────────────────────────
menu_driver = "ozone"
menu_show_load_content = "true"
menu_show_load_content_animation = "false"
menu_pause_libretro = "false"
menu_thumbnails = "2"  # Both

# ── Performance ──────────────────────────────────────────────────────────────
rewind_enable = "false"
runahead_enabled = "false"
fastforward_ratio = "3.0"
state_slot = "-1"  # Auto

# ── Logging (debug only) ─────────────────────────────────────────────────────
log_verbosity = "false"
log_to_file = "false"
log_to_file_timestamp = "false"

# ── Misc ─────────────────────────────────────────────────────────────────────
bundle_assets_extract_enable = "false"
config_save_on_exit = "true"
show_hidden_files = "false"