# PulsarOS Thermal Policy for Allwinner H618
# SPDX-License-Identifier: MIT

[thermal-engine]
polling_interval=2000

[algo-h618-safe]
type=algorithm
sample_period=2000

[action-throttle-mild]
type=cpu_freq_scaling
temp_threshold=75
freq_step=50
cooldown=60000

[action-throttle-heavy]
type=cpu_freq_scaling
temp_threshold=85
freq_step=75
cooldown=60000

[action-shutdown]
type=shutdown
temp_threshold=95
cooldown=0